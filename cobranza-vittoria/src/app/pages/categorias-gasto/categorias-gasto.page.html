<div class="page-header">
  <div>
    <div class="page-title">Categorías de gasto</div>
    <div class="page-subtitle">Mantenimiento del catálogo usado por los gastos administrativos.</div>
  </div>
</div>

<div class="split split--form admin-split">
  <section class="panel">
    <div class="panel-title">Listado</div>

    <div class="filters filters--two compact-filters">
      <div class="field">
        <label>Estado</label>
        <select [(ngModel)]="filtroActivo" (change)="load()">
          <option value="">Todos</option>
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>
    </div>

    <div *ngIf="loading" class="empty-state">Cargando categorías...</div>
    <div *ngIf="!loading && !rows.length" class="empty-state">No hay categorías registradas.</div>

    <div *ngIf="!loading && rows.length" class="table-wrap table-wrap--sticky-actions">
      <table>
        <thead>
          <tr>
            <th>Categoría</th>
            <th>Estado</th>
            <th class="actions-col">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of rows">
            <td>{{ row.nombre }}</td>
            <td>
              <span class="badge" [class.badge--ok]="row.activo" [class.badge--neutral]="!row.activo">
                {{ row.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td>
              <div class="actions actions--stack-mobile actions--end">
                <button class="btn btn-secondary" (click)="edit(row)">Editar</button>
                <button class="btn btn-danger" (click)="remove(row)" [disabled]="!row.activo">Desactivar</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="panel panel--form">
    <div class="panel-title">Formulario</div>

    <div class="form-grid one">
      <div class="field">
        <label>Nombre</label>
        <input [(ngModel)]="form.nombre" placeholder="Ej. Servicios básicos" />
      </div>

      <div class="field">
        <label>Estado</label>
        <select [(ngModel)]="form.activo">
          <option [ngValue]="true">Activo</option>
          <option [ngValue]="false">Inactivo</option>
        </select>
      </div>
    </div>

    <div class="toolbar toolbar--compact">
      <button class="btn btn-primary" (click)="save()">Guardar categoría</button>
      <button class="btn btn-ghost" (click)="reset()">Limpiar</button>
    </div>
  </section>
</div>
